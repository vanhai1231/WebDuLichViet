<!DOCTYPE html>
<!-- Created By CodingLab - www.codinglabweb.com -->
<html lang="en" dir="ltr" xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title> Responsive Login Form | CodingLab </title>
    <link th:href="@{CSS/style.css}" href="../../static/CSS/style.css"
          rel="stylesheet" type="text/css" media="screen"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.2/css/all.min.css"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<div class="container">
    <form action="#">
        <div class="title">Đăng nhập</div>
        <div class="facebook">
            <a href="#"><i class="fab fa-facebook-f"></i>Đăng nhập bằng Facebook</a>
        </div>
        <div class="google">
            <a href="#"><i class="fab fa-twitter"></i>Đăng nhập bằng Google</a>
        </div>
        <div class="option">Hoặc đăng nhập bằng số điện thoại, Email</div>
        <div class="input-box underline">
            <input type="text" placeholder="Nhập số điện thoại hoặc Email" required>
            <div class="underline"></div>
        </div>
        <div class="input-box">
            <input type="password" placeholder="Nhập mật khẩu" required>
            <div class="underline"></div>
        </div>
        <div class="input-box button">
            <input type="submit" name="" value="Đăng nhập">
        </div>
    </form>
    <a href="#">Quên mật khẩu?</a>
    <div class="bottom-link">
        Chưa có tài khoản?
        <a href="#" id="signup-link">Đăng ký ngay</a>
    </div>
</div>
</body>
</html>
